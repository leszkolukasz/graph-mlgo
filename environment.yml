name: graph-mlgo
channels:
  - local
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python=3.12
  - pip
  - cmake
  - ninja
  - scikit-build-core
  - pybind11
  
  - llvmdev
  - llvmlite

  - cuda-nvcc
  - cuda-runtime
  - cudnn

  - numpy>=2.4.3
  - matplotlib>=3.10.9
  - networkx>=3.6.1
  - datasets>=4.8.5
  - gymnasium>=1.3.0
  - loguru>=0.7.3

  - pip:
    - "jax[cuda12]>=0.9.2"
    - flax>=0.12.6
    - distrax>=0.1.8
